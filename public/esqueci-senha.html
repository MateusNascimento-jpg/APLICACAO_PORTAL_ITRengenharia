<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esqueci minha senha — ITR Engenharia</title>
  <link rel="icon" href="IMG/logo.png">

  <style>
    :root {
      --bg: #2b2e31;
      --card: rgba(38, 41, 45, .78);
      --line: rgba(150, 170, 195, .24);
      --azul: #3d7be0;
      --azul-claro: #7ba2e6;
      --txt: #f3f5f8;
      --txt-2: #c9cdd4;
      --txt-3: #8b97a8;
      --field: rgba(18, 20, 23, .58);
      --erro: #ffb4b4;
      --ok: #86e0ad;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: radial-gradient(circle at 50% 0%, rgba(61, 123, 224, .16), transparent 36%), var(--bg);
      color: var(--txt);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .box {
      width: min(460px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 22px 60px rgba(0, 0, 0, .35);
    }

    .logo {
      width: 150px;
      filter: brightness(0) invert(1);
      display: block;
      margin: 0 auto 22px;
    }

    h1 {
      font-size: 25px;
      margin: 0 0 8px;
    }

    p {
      color: var(--txt-3);
      line-height: 1.45;
    }

    label {
      display: block;
      color: var(--txt-2);
      font-size: 13px;
      margin: 18px 0 7px;
    }

    input {
      width: 100%;
      height: 46px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--field);
      color: var(--txt);
      padding: 0 13px;
      font-size: 15px;
    }

    button {
      width: 100%;
      height: 48px;
      margin-top: 18px;
      border: 0;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--azul), #245eac);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .msg {
      display: none;
      margin-top: 14px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--line);
      font-size: 14px;
    }

    .msg.ok {
      display: block;
      color: var(--ok);
      background: rgba(40, 150, 95, .13);
    }

    .msg.erro {
      display: block;
      color: var(--erro);
      background: rgba(200, 60, 60, .13);
    }

    a {
      color: var(--azul-claro);
      text-decoration: none;
    }

    .voltar {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <main class="box">
    <img src="IMG/logo.png" class="logo" alt="ITR Engenharia">

    <h1>Recuperar senha</h1>

    <p>
      Informe o e-mail cadastrado. Se ele existir no sistema, enviaremos um link de redefinição.
    </p>

    <form id="form">
      <label for="email">E-mail</label>
      <input id="email" type="email" autocomplete="email" required>

      <button id="btn">Enviar link</button>
    </form>

    <div id="msg" class="msg"></div>

    <div class="voltar">
      <a href="login.html">Voltar para o login</a>
    </div>
  </main>

  <script>
    var form = document.getElementById('form');
    var msg = document.getElementById('msg');
    var btn = document.getElementById('btn');

    function mostrar(texto, tipo) {
      msg.textContent = texto;
      msg.className = 'msg ' + tipo;
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      btn.disabled = true;
      btn.textContent = 'Enviando...';

      fetch('/api/esqueci-senha', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          email: document.getElementById('email').value.trim()
        })
      })
        .then(function (r) {
          return r.json();
        })
        .then(function (d) {
          mostrar(d.mensagem || d.erro || 'Pedido processado.', 'ok');
        })
        .catch(function () {
          mostrar('Não foi possível conectar ao servidor.', 'erro');
        })
        .finally(function () {
          btn.disabled = false;
          btn.textContent = 'Enviar link';
        });
    });
  </script>
</body>
</html>
